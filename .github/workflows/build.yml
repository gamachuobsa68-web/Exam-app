name: Build APK FIXED

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget curl openjdk-17-jdk

        python -m pip install --upgrade pip
        pip install cython buildozer

    # =========================
    # FIX SDK PROPERLY (IMPORTANT)
    # =========================
    - name: Setup Android SDK Proper Fix
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME

        mkdir -p $ANDROID_HOME
        cd $HOME

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-*.zip -d $ANDROID_HOME

        mkdir -p $ANDROID_HOME/cmdline-tools/latest
        mv $ANDROID_HOME/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ || true

        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

        sdkmanager --sdk_root=$ANDROID_HOME \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;34.0.0"

    - name: Build APK
      run: |
        buildozer android debug
