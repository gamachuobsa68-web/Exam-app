name: Build Android APK (FULL FIXED)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. Checkout code
    # =========================
    - name: Checkout repository
      uses: actions/checkout@v4

    # =========================
    # 2. Setup Python
    # =========================
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # 3. Install system packages
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget curl openjdk-17-jdk

    # =========================
    # 4. Install Python tools
    # =========================
    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    # =========================
    # 5. ANDROID SDK FIX (IMPORTANT 🔥)
    # =========================
    - name: Install Android SDK + Fix Licenses
      run: |
        export ANDROID_SDK_ROOT=$HOME/android-sdk

        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-*.zip

        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ || true

        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

        # 🔥 ACCEPT ALL LICENSES (FIX YOUR ERROR)
        yes | sdkmanager --licenses || true

        # 🔥 INSTALL STABLE BUILD TOOLS (NOT 37!)
        sdkmanager "platform-tools" \
                   "platforms;android-33" \
                   "build-tools;34.0.0"

    # =========================
    # 6. Build APK
    # =========================
    - name: Build APK with Buildozer
      run: |
        buildozer android debug
